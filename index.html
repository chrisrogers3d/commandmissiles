<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Command Missiles AR</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            background: #000;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #0f0;
            text-shadow: 0 0 10px #0f0;
            font-size: 24px;
            pointer-events: none;
            z-index: 100;
        }
        #enter-vr {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 30px;
            font-size: 18px;
            background: #0f0;
            color: #000;
            border: none;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            display: none;
        }
        #enter-vr:hover {
            background: #0ff;
        }
        #instructions {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #0f0;
            text-align: center;
            font-size: 18px;
            text-shadow: 0 0 10px #0f0;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="ui">
        <div>SCORE: <span id="score">0</span></div>
        <div>CITIES: <span id="cities">6</span></div>
        <div>AMMO: <span id="ammo">30</span></div>
    </div>
    <button id="start-game" style="position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%); padding: 15px 30px; font-size: 18px; background: #0ff; color: #000; border: none; cursor: pointer; font-family: 'Courier New', monospace; font-weight: bold; display: block;">START GAME</button>
    <button id="enter-vr">ENTER AR</button>
    <div id="debug" style="position: absolute; top: 120px; left: 20px; color: #ff0; font-size: 14px; z-index: 100; pointer-events: none;"></div>
    <div id="instructions">
        ADJUST CONFIG THEN START<br>
        MOUSE TO AIM | CLICK TO FIRE<br>
        AR: POINT AND PINCH TO FIRE
    </div>
    <script type="module" src="/index.js"></script>
</body>
</html>
